name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish. Use v0.2.0 for stable tags or nightly to create a timestamped nightly tag.'
        required: true
        type: string
      include_linux:
        description: 'Build Linux desktop and agent artifacts. Tag pushes always build Linux.'
        required: false
        default: false
        type: boolean
      include_ios:
        description: 'Build iOS/TestFlight artifacts. Disabled for tag pushes until mobile release lane is ready.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  DIOXUS_CLI_VERSION: 0.7.9

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      app_version: ${{ steps.meta.outputs.app_version }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name == 'nightly' && github.event.repository.default_branch || inputs.tag_name || github.ref }}

      - id: meta
        name: Compute release metadata
        run: |
          CARGO_VERSION=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          workspace = tomllib.loads(Path("Cargo.toml").read_text())
          print(workspace["workspace"]["package"]["version"])
          PY
          )
          CHECKOUT_REF="${{ inputs.tag_name == 'nightly' && github.event.repository.default_branch || inputs.tag_name || github.ref }}"
          if [ "${{ inputs.tag_name }}" = "nightly" ]; then
            COMMIT=$(git rev-parse HEAD)
            STAMP=$(date -u +%Y%m%d%H%M%S)
            RELEASE_TAG="nightly-${STAMP}-${COMMIT:0:7}"
            APP_VERSION="$CARGO_VERSION"
          else
            RELEASE_TAG="${{ inputs.tag_name || github.ref_name }}"
            APP_VERSION="${RELEASE_TAG#v}"
            if [ "$APP_VERSION" != "$CARGO_VERSION" ]; then
              echo "::error::Release tag $RELEASE_TAG does not match Cargo.toml workspace version $CARGO_VERSION"
              exit 1
            fi
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build ${{ matrix.target }}
    needs: prepare-release
    if: github.event_name == 'push' || inputs.include_linux
    runs-on: ${{ matrix.runner }}
    env:
      FLYNT_RELEASE_VERIFY_KEY_B64: ${{ secrets.FLYNT_RELEASE_VERIFY_KEY_B64 }}
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Validate release verification key
        run: |
          if [ -z "${FLYNT_RELEASE_VERIFY_KEY_B64:-}" ]; then
            echo "::error::FLYNT_RELEASE_VERIFY_KEY_B64 is required so release builds can verify signed update manifests"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-${{ matrix.target }}
          cache-bin: false

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            pkg-config \
            cmake

      - name: Install Dioxus CLI
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) DX_TARGET="x86_64-unknown-linux-gnu" ;;
            Linux-aarch64|Linux-arm64) DX_TARGET="aarch64-unknown-linux-gnu" ;;
            Darwin-x86_64) DX_TARGET="x86_64-apple-darwin" ;;
            Darwin-arm64) DX_TARGET="aarch64-apple-darwin" ;;
            *) echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac

          BASE_URL="https://github.com/DioxusLabs/dioxus/releases/download/v${DIOXUS_CLI_VERSION}"
          curl -fsSL "$BASE_URL/dx-$DX_TARGET.tar.gz" -o "$RUNNER_TEMP/dx.tar.gz"
          curl -fsSL "$BASE_URL/dx-$DX_TARGET.sha256" -o "$RUNNER_TEMP/dx.sha256"
          awk '/tar.gz/ {print $1 "  '"$RUNNER_TEMP"'/dx.tar.gz"}' "$RUNNER_TEMP/dx.sha256" > "$RUNNER_TEMP/dx.sha256.check"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c "$RUNNER_TEMP/dx.sha256.check"
          else
            sha256sum -c "$RUNNER_TEMP/dx.sha256.check"
          fi
          tar xzf "$RUNNER_TEMP/dx.tar.gz" -C "$RUNNER_TEMP"
          mkdir -p "$HOME/.cargo/bin"
          install "$RUNNER_TEMP/dx" "$HOME/.cargo/bin/dx"
          dx --version

      - name: Build desktop release
        run: |
          TOOLCHAIN_BIN="$(dirname "$(find "$HOME/.rustup/toolchains" -path "*/bin/cargo" -type f | head -1)")"
          export PATH="$TOOLCHAIN_BIN:$PATH"
          export CARGO="$TOOLCHAIN_BIN/cargo"
          "$CARGO" --version
          cd crates/flynt-app
          dx build --platform desktop --release || {
            cd ../..
            "$CARGO" build --release -p flynt-app
            exit 1
          }

      - name: Prepare archive
        run: |
          DIST="flynt-${{ env.RELEASE_TAG }}-linux-${{ matrix.arch }}"
          mkdir -p "$DIST"

          # Find the built binary — dx output path varies by version
          BIN=""
          for candidate in \
            "target/dx/flynt/release/linux/app/flynt" \
            "target/dx/flynt/release/linux/app/flynt-app" \
            "target/dx/flynt-app/release/linux/app/flynt" \
            "target/dx/flynt-app/release/linux/app/flynt-app" \
            "target/release/flynt" \
            "target/release/flynt-app"; do
            if [ -f "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done

          if [ -z "$BIN" ]; then
            echo "ERROR: Could not find built binary. Contents of target/dx/:"
            find target/dx/ -type f \( -name "flynt-*" -o -name "flynt*" \) 2>/dev/null || true
            exit 1
          fi

          cp "$BIN" "$DIST/flynt"
          chmod +x "$DIST/flynt"

          # Copy assets directory if it exists (dx bundles assets alongside binary)
          ASSETS_DIR="$(dirname "$BIN")/assets"
          if [ -d "$ASSETS_DIR" ]; then
            cp -r "$ASSETS_DIR" "$DIST/assets"
          fi

          # Copy icon + desktop entry
          cp crates/flynt-app/assets/icon.png "$DIST/flynt.png"

          cat > "$DIST/flynt.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Flynt
          Comment=Local-first knowledge management
          Exec=flynt
          Icon=flynt
          Type=Application
          Categories=Office;TextEditor;
          MimeType=text/markdown;
          DESKTOP

          tar czf "$DIST.tar.gz" "$DIST"
          echo "ARCHIVE=$DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Build flynt-agent
        run: cargo build --release -p flynt-agent --target ${{ matrix.target }}

      - name: Package flynt-agent
        run: |
          VERSION="${RELEASE_TAG#v}"
          AGENT_DIST="flynt-agent-${VERSION}-${{ matrix.target }}"
          mkdir -p "$AGENT_DIST"
          cp "target/${{ matrix.target }}/release/flynt-agent" "$AGENT_DIST/flynt-agent"
          chmod +x "$AGENT_DIST/flynt-agent"
          cp crates/flynt-agent/manifest.toml "$AGENT_DIST/manifest.toml"
          tar czf "$AGENT_DIST.tar.gz" "$AGENT_DIST"
          echo "AGENT_ARCHIVE=$AGENT_DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynt-linux-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

      - name: Upload flynt-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynt-agent-linux-${{ matrix.arch }}
          path: ${{ env.AGENT_ARCHIVE }}

  # ─── Apple Signing Setup (shared) ─────────────────────────
  # Required GitHub Secrets:
  #   APPLE_DIST_CERT_P12_B64      - Apple Distribution cert + key as .p12, base64
  #   APPLE_DIST_CERT_PASSWORD     - Password for the .p12
  #   APPLE_DEVID_INSTALLER_CERT_P12_B64 - Developer ID Installer cert + key as .p12, base64
  #   APPLE_DEVID_INSTALLER_CERT_PASSWORD
  #   APPLE_INSTALLER_CERT_P12_B64       - 3rd Party Mac Developer Installer cert for TestFlight, base64
  #   APPLE_INSTALLER_CERT_PASSWORD
  #   APPLE_API_KEY_P8_B64         - App Store Connect API key (.p8), base64
  #   APPLE_API_KEY_ID             - Key ID (e.g. ABC123XYZ)
  #   APPLE_API_ISSUER             - Issuer ID
  #   IOS_DIST_PROFILE_B64         - iOS App Store distribution profile, base64
  #   IOS_SHARE_DIST_PROFILE_B64   - iOS share extension distribution profile, base64
  #   MACOS_DIST_PROFILE_B64       - macOS App Store distribution profile, base64
  #   APPLE_SIGNING_CERT_B64       - Developer ID cert for DMG signing (existing)
  #   APPLE_SIGNING_CERT_PASSWORD
  #   APPLE_CODESIGN_IDENTITY      - Legacy Developer ID identity string; CI derives the SHA from the imported cert

  build-macos:
    name: Build macOS (universal)
    needs: prepare-release
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
      APPLE_SIGNING_CERT_B64: ${{ secrets.APPLE_SIGNING_CERT_B64 }}
      APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_DIST_CERT_P12_B64: ${{ secrets.APPLE_DIST_CERT_P12_B64 }}
      APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
      APPLE_DEVID_INSTALLER_CERT_P12_B64: ${{ secrets.APPLE_DEVID_INSTALLER_CERT_P12_B64 }}
      APPLE_DEVID_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_DEVID_INSTALLER_CERT_PASSWORD }}
      APPLE_INSTALLER_CERT_P12_B64: ${{ secrets.APPLE_INSTALLER_CERT_P12_B64 }}
      APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
      APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      FLYNT_RELEASE_VERIFY_KEY_B64: ${{ secrets.FLYNT_RELEASE_VERIFY_KEY_B64 }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Validate release verification key
        run: |
          if [ -z "${FLYNT_RELEASE_VERIFY_KEY_B64:-}" ]; then
            echo "::error::FLYNT_RELEASE_VERIFY_KEY_B64 is required so release builds can verify signed update manifests"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-universal
          cache-bin: false

      - name: Install Dioxus CLI
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) DX_TARGET="x86_64-unknown-linux-gnu" ;;
            Linux-aarch64|Linux-arm64) DX_TARGET="aarch64-unknown-linux-gnu" ;;
            Darwin-x86_64) DX_TARGET="x86_64-apple-darwin" ;;
            Darwin-arm64) DX_TARGET="aarch64-apple-darwin" ;;
            *) echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac

          BASE_URL="https://github.com/DioxusLabs/dioxus/releases/download/v${DIOXUS_CLI_VERSION}"
          curl -fsSL "$BASE_URL/dx-$DX_TARGET.tar.gz" -o "$RUNNER_TEMP/dx.tar.gz"
          curl -fsSL "$BASE_URL/dx-$DX_TARGET.sha256" -o "$RUNNER_TEMP/dx.sha256"
          awk '/tar.gz/ {print $1 "  '"$RUNNER_TEMP"'/dx.tar.gz"}' "$RUNNER_TEMP/dx.sha256" > "$RUNNER_TEMP/dx.sha256.check"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c "$RUNNER_TEMP/dx.sha256.check"
          else
            sha256sum -c "$RUNNER_TEMP/dx.sha256.check"
          fi
          tar xzf "$RUNNER_TEMP/dx.tar.gz" -C "$RUNNER_TEMP"
          mkdir -p "$HOME/.cargo/bin"
          install "$RUNNER_TEMP/dx" "$HOME/.cargo/bin/dx"
          dx --version

      - name: Build desktop release
        run: |
          TOOLCHAIN_BIN="$(dirname "$(find "$HOME/.rustup/toolchains" -path "*/bin/cargo" -type f | head -1)")"
          export PATH="$TOOLCHAIN_BIN:$PATH"
          export CARGO="$TOOLCHAIN_BIN/cargo"
          "$CARGO" --version
          cd crates/flynt-app
          MACOSX_DEPLOYMENT_TARGET=12.0 dx build --platform desktop --release

      - name: Prepare app bundle
        run: |
          APP="target/dx/flynt/release/macos/Flynt.app"
          PLIST="$APP/Contents/Info.plist"
          PB=/usr/libexec/PlistBuddy

          cp crates/flynt-app/assets/icon.icns "$APP/Contents/Resources/AppIcon.icns"
          $PB -c "Set :CFBundleIconFile AppIcon" "$PLIST" 2>/dev/null || \
            $PB -c "Add :CFBundleIconFile string AppIcon" "$PLIST"
          $PB -c "Set :CFBundleShortVersionString ${APP_VERSION}" "$PLIST" 2>/dev/null
          $PB -c "Add :LSApplicationCategoryType string public.app-category.productivity" "$PLIST" 2>/dev/null || \
            $PB -c "Set :LSApplicationCategoryType public.app-category.productivity" "$PLIST"
          $PB -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || true
          $PB -c "Add :LSMinimumSystemVersion string 12.0" "$PLIST" 2>/dev/null || \
            $PB -c "Set :LSMinimumSystemVersion 12.0" "$PLIST"

          mkdir -p "$APP/Contents/Resources/assets/vendor"
          cp crates/flynt-app/assets/vendor/* "$APP/Contents/Resources/assets/vendor/"

      - name: Validate direct macOS distribution secrets
        run: |
          missing=0
          for var in APPLE_SIGNING_CERT_B64 APPLE_SIGNING_CERT_PASSWORD APPLE_API_KEY_P8_B64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var is required for signed and notarized direct macOS releases"
              missing=1
            fi
          done
          if [ -n "${APPLE_DEVID_INSTALLER_CERT_P12_B64:-}" ] && [ -z "${APPLE_DEVID_INSTALLER_CERT_PASSWORD:-}" ]; then
            echo "::error::APPLE_DEVID_INSTALLER_CERT_PASSWORD is required when APPLE_DEVID_INSTALLER_CERT_P12_B64 is set"
            missing=1
          fi
          if [ -n "${APPLE_INSTALLER_CERT_P12_B64:-}" ] && [ -z "${APPLE_INSTALLER_CERT_PASSWORD:-}" ]; then
            echo "::error::APPLE_INSTALLER_CERT_PASSWORD is required when APPLE_INSTALLER_CERT_P12_B64 is set"
            missing=1
          fi
          if [ -z "${APPLE_DEVID_INSTALLER_CERT_P12_B64:-}" ] && [ -z "${APPLE_INSTALLER_CERT_P12_B64:-}" ]; then
            echo "::error::A Developer ID Installer certificate is required for the v0.10.0 direct-download PKG. Set APPLE_DEVID_INSTALLER_CERT_P12_B64, or ensure APPLE_INSTALLER_CERT_P12_B64 contains a Developer ID Installer identity."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Import signing certs
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/flynt-signing.keychain-db"
          KEYCHAIN_PASSWORD="${{ github.run_id }}-${{ github.run_attempt }}"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Apple Distribution cert (for TestFlight)
          if [ -n "$APPLE_DIST_CERT_P12_B64" ]; then
            echo "$APPLE_DIST_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
            security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN_PATH" \
              -P "$APPLE_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          fi

          # Developer ID cert (for DMG direct distribution)
          echo "$APPLE_SIGNING_CERT_B64" | base64 --decode > "$RUNNER_TEMP/devid-app.p12"
          security import "$RUNNER_TEMP/devid-app.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A

          # Direct-download PKG cert. Prefer the explicit Developer ID Installer
          # secret; fall back to the legacy installer secret if it contains the
          # right identity.
          if [ -n "$APPLE_DEVID_INSTALLER_CERT_P12_B64" ]; then
            echo "$APPLE_DEVID_INSTALLER_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/devid-installer.p12"
            security import "$RUNNER_TEMP/devid-installer.p12" -k "$KEYCHAIN_PATH" \
              -P "$APPLE_DEVID_INSTALLER_CERT_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/pkgbuild -T /usr/bin/security -A
          fi

          # App Store/TestFlight installer cert. This may be a 3rd Party Mac
          # Developer Installer identity and is not sufficient for direct PKGs.
          if [ -n "$APPLE_INSTALLER_CERT_P12_B64" ]; then
            echo "$APPLE_INSTALLER_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
            security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN_PATH" \
              -P "$APPLE_INSTALLER_CERT_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/pkgbuild -T /usr/bin/security -A
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          DEVID_APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ {print $2; exit}')
          if [ -z "$DEVID_APP_IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported signing certificates"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "DEVID_APP_IDENTITY=$DEVID_APP_IDENTITY" >> "$GITHUB_ENV"

      - name: Sign for DMG (Developer ID)
        run: |
          APP="target/dx/flynt/release/macos/Flynt.app"
          ENTITLEMENTS="crates/flynt-app/Flynt.entitlements"
          if [ ! -f "$ENTITLEMENTS" ]; then
            ENTITLEMENTS="crates/flynt-app/Codex.entitlements"
          fi
          if [ ! -f "$ENTITLEMENTS" ]; then
            ENTITLEMENTS="$RUNNER_TEMP/Flynt.entitlements"
            cat > "$ENTITLEMENTS" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <false/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
          </dict>
          </plist>
          PLIST
          fi

          find "$APP/Contents" -type f \( -name "*.dylib" -o -perm +111 \) ! -name "Info.plist" ! -name "*.plist" | while read -r bin; do
            codesign -f -s "$DEVID_APP_IDENTITY" --keychain "$KEYCHAIN_PATH" --options runtime --timestamp "$bin" 2>/dev/null || true
          done

          codesign -f -s "$DEVID_APP_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Create DMG
        run: |
          APP="target/dx/flynt/release/macos/Flynt.app"
          VERSION="${RELEASE_TAG#v}"
          STAGING=$(mktemp -d)
          DMG="Flynt-$VERSION-macos.dmg"
          trap 'rm -rf "$STAGING"' EXIT
          cp -r "$APP" "$STAGING/Flynt.app"
          ln -s /Applications "$STAGING/Applications"
          sync
          for attempt in 1 2 3; do
            rm -f "$DMG"
            if hdiutil create -volname "Flynt" -srcfolder "$STAGING" -ov -format UDZO "$DMG"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Create direct-download PKG
        run: |
          APP="target/dx/flynt/release/macos/Flynt.app"
          ARTIFACT_VERSION="${RELEASE_TAG#v}"
          PKG="Flynt-$ARTIFACT_VERSION-macos.pkg"
          COMPONENT_PLIST="$RUNNER_TEMP/flynt-component.plist"
          COMPONENT_PKG="$RUNNER_TEMP/flynt-component.pkg"
          COMPONENT_ROOT="$RUNNER_TEMP/flynt-component-root"
          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)"/\1/')

          if [ -z "$INSTALLER_IDENTITY" ]; then
            echo "::error::No Developer ID Installer identity found. v0.10.0 release requires Flynt-$ARTIFACT_VERSION-macos.pkg."
            exit 1
          fi

          rm -rf "$COMPONENT_ROOT"
          mkdir -p "$COMPONENT_ROOT"
          cp -R "$APP" "$COMPONENT_ROOT/Flynt.app"

          cat > "$COMPONENT_PLIST" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <array>
            <dict>
              <key>RootRelativeBundlePath</key>
              <string>Flynt.app</string>
              <key>BundleIsRelocatable</key>
              <false/>
              <key>BundleIsVersionChecked</key>
              <false/>
              <key>BundleHasStrictIdentifier</key>
              <true/>
              <key>BundleOverwriteAction</key>
              <string>upgrade</string>
            </dict>
          </array>
          </plist>
          PLIST

          pkgbuild --root "$COMPONENT_ROOT" \
            --install-location /Applications \
            --identifier io.styrene.flynt \
            --version "$APP_VERSION" \
            --component-plist "$COMPONENT_PLIST" \
            "$COMPONENT_PKG"

          productbuild --package "$COMPONENT_PKG" \
            --sign "$INSTALLER_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "$PKG"

          pkgutil --check-signature "$PKG"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Notarize direct macOS artifacts
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$KEY_PATH"

          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 600
          xcrun stapler staple "$DMG" || (sleep 30 && xcrun stapler staple "$DMG")

          test -n "${PKG:-}"
          test -f "$PKG"
          xcrun notarytool submit "$PKG" \
            --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 600
          xcrun stapler staple "$PKG" || (sleep 30 && xcrun stapler staple "$PKG")

      - name: Build TestFlight .pkg
        continue-on-error: true
        if: env.APPLE_DIST_CERT_P12_B64 != ''
        env:
          APPLE_DIST_CERT_P12_B64: ${{ secrets.APPLE_DIST_CERT_P12_B64 }}
          MACOS_DIST_PROFILE_B64: ${{ secrets.MACOS_DIST_PROFILE_B64 }}
        run: |
          APP="target/dx/flynt/release/macos/Flynt.app"
          DIST_APP="dist/Flynt.app"
          rm -rf dist/Flynt.app
          mkdir -p dist
          cp -R "$APP" "$DIST_APP"

          # Embed provisioning profile
          if [ -n "$MACOS_DIST_PROFILE_B64" ]; then
            echo "$MACOS_DIST_PROFILE_B64" | base64 --decode > "$DIST_APP/Contents/embedded.provisionprofile"
          fi

          # Strip quarantine xattr (ITMS-91109)
          xattr -cr "$DIST_APP"

          # Re-sign with Apple Distribution + sandbox entitlements
          DIST_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          APPSTORE_ENTITLEMENTS="crates/flynt-app/Flynt.appstore.entitlements"
          if [ ! -f "$APPSTORE_ENTITLEMENTS" ]; then
            APPSTORE_ENTITLEMENTS="crates/flynt-app/Codex.appstore.entitlements"
          fi
          codesign --deep --force \
            --entitlements "$APPSTORE_ENTITLEMENTS" \
            --sign "$DIST_IDENTITY" --keychain "$KEYCHAIN_PATH" \
            --options runtime "$DIST_APP"

          # Package .pkg
          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "3rd Party Mac Developer Installer" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -n "$INSTALLER_IDENTITY" ]; then
            productbuild --component "$DIST_APP" /Applications --sign "$INSTALLER_IDENTITY" dist/Flynt.pkg
          else
            productbuild --component "$DIST_APP" /Applications dist/Flynt.pkg
          fi

      - name: Upload to TestFlight (macOS)
        continue-on-error: true
        if: env.APPLE_API_KEY_P8_B64 != ''
        env:
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          mkdir -p private_keys
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          xcrun altool --upload-app --type osx --file dist/Flynt.pkg \
            --apiKey "$APPLE_API_KEY_ID" --apiIssuer "$APPLE_API_ISSUER"

      - name: Build flynt-agent (universal)
        run: |
          cargo build --release -p flynt-agent --target aarch64-apple-darwin
          cargo build --release -p flynt-agent --target x86_64-apple-darwin
          mkdir -p target/universal-release
          lipo -create \
            target/aarch64-apple-darwin/release/flynt-agent \
            target/x86_64-apple-darwin/release/flynt-agent \
            -output target/universal-release/flynt-agent

      - name: Package flynt-agent (universal)
        run: |
          VERSION="${RELEASE_TAG#v}"
          AGENT_DIST="flynt-agent-${VERSION}-universal-apple-darwin"
          mkdir -p "$AGENT_DIST"
          cp target/universal-release/flynt-agent "$AGENT_DIST/flynt-agent"
          chmod +x "$AGENT_DIST/flynt-agent"
          cp crates/flynt-agent/manifest.toml "$AGENT_DIST/manifest.toml"
          tar czf "$AGENT_DIST.tar.gz" "$AGENT_DIST"
          echo "AGENT_ARCHIVE=$AGENT_DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynt-macos
          path: ${{ env.DMG }}

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynt-macos-pkg
          path: ${{ env.PKG }}

      - name: Upload flynt-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: flynt-agent-macos-universal
          path: ${{ env.AGENT_ARCHIVE }}

  build-ios:
    name: Build iOS + TestFlight
    needs: prepare-release
    if: github.event_name == 'workflow_dispatch' && inputs.include_ios
    runs-on: macos-15
    continue-on-error: true
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
      APPLE_DIST_CERT_P12_B64: ${{ secrets.APPLE_DIST_CERT_P12_B64 }}
      APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
      IOS_DIST_PROFILE_B64: ${{ secrets.IOS_DIST_PROFILE_B64 }}
      IOS_SHARE_DIST_PROFILE_B64: ${{ secrets.IOS_SHARE_DIST_PROFILE_B64 }}
      APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: release-ios

      - name: Install Dioxus CLI
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) DX_TARGET="x86_64-unknown-linux-gnu" ;;
            Linux-aarch64|Linux-arm64) DX_TARGET="aarch64-unknown-linux-gnu" ;;
            Darwin-x86_64) DX_TARGET="x86_64-apple-darwin" ;;
            Darwin-arm64) DX_TARGET="aarch64-apple-darwin" ;;
            *) echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac

          BASE_URL="https://github.com/DioxusLabs/dioxus/releases/download/v${DIOXUS_CLI_VERSION}"
          curl -fsSL "$BASE_URL/dx-$DX_TARGET.tar.gz" -o "$RUNNER_TEMP/dx.tar.gz"
          curl -fsSL "$BASE_URL/dx-$DX_TARGET.sha256" -o "$RUNNER_TEMP/dx.sha256"
          awk '/tar.gz/ {print $1 "  '"$RUNNER_TEMP"'/dx.tar.gz"}' "$RUNNER_TEMP/dx.sha256" > "$RUNNER_TEMP/dx.sha256.check"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c "$RUNNER_TEMP/dx.sha256.check"
          else
            sha256sum -c "$RUNNER_TEMP/dx.sha256.check"
          fi
          tar xzf "$RUNNER_TEMP/dx.tar.gz" -C "$RUNNER_TEMP"
          mkdir -p "$HOME/.cargo/bin"
          install "$RUNNER_TEMP/dx" "$HOME/.cargo/bin/dx"
          dx --version

      - name: Import signing certs & profiles
        if: env.APPLE_DIST_CERT_P12_B64 != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/flynt-ios-signing.keychain-db"
          KEYCHAIN_PASSWORD="${{ github.run_id }}-${{ github.run_attempt }}"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_DIST_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Install provisioning profiles with UUID filenames
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          for VAR in IOS_DIST_PROFILE_B64 IOS_SHARE_DIST_PROFILE_B64; do
            PROFILE_DATA="${!VAR}"
            if [ -n "$PROFILE_DATA" ]; then
              PROFILE_PATH="$RUNNER_TEMP/profile_${VAR}.mobileprovision"
              echo "$PROFILE_DATA" | base64 --decode > "$PROFILE_PATH"
              UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | grep -A1 UUID | grep string | sed 's/.*<string>//;s/<\/string.*//')
              cp "$PROFILE_PATH" "$PROFILES_DIR/$UUID.mobileprovision"
            fi
          done

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build iOS app
        run: |
          cd crates/flynt-mobile
          IPHONEOS_DEPLOYMENT_TARGET=17.0 dx build --platform ios --device --release --codesign false

      - name: Patch Info.plist
        run: |
          APP="target/dx/flynt-mobile/release/ios/FlyntMobile.app"
          PLIST="$APP/Info.plist"
          PB=/usr/libexec/PlistBuddy
          ARTIFACT_VERSION="${RELEASE_TAG#v}"

          $PB -c "Add :CFBundlePackageType string APPL" "$PLIST" 2>/dev/null || $PB -c "Set :CFBundlePackageType APPL" "$PLIST"
          $PB -c "Add :MinimumOSVersion string 17.0" "$PLIST" 2>/dev/null || $PB -c "Set :MinimumOSVersion 17.0" "$PLIST"
          $PB -c "Add :DTPlatformName string iphoneos" "$PLIST" 2>/dev/null || $PB -c "Set :DTPlatformName iphoneos" "$PLIST"
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || echo "17.0")
          $PB -c "Add :DTPlatformVersion string $SDK_VER" "$PLIST" 2>/dev/null || $PB -c "Set :DTPlatformVersion $SDK_VER" "$PLIST"
          $PB -c "Add :DTSDKName string iphoneos$SDK_VER" "$PLIST" 2>/dev/null || $PB -c "Set :DTSDKName iphoneos$SDK_VER" "$PLIST"
          XCODE_BUILD=$(defaults read "$(xcode-select -p)/../Info.plist" DTXcodeBuild 2>/dev/null || echo "unknown")
          SDK_BUILD=$(xcrun --sdk iphoneos --show-sdk-build-version 2>/dev/null || echo "unknown")
          $PB -c "Add :DTXcode string $XCODE_BUILD" "$PLIST" 2>/dev/null || $PB -c "Set :DTXcode $XCODE_BUILD" "$PLIST"
          $PB -c "Add :DTXcodeBuild string $XCODE_BUILD" "$PLIST" 2>/dev/null || $PB -c "Set :DTXcodeBuild $XCODE_BUILD" "$PLIST"
          $PB -c "Add :DTSDKBuild string $SDK_BUILD" "$PLIST" 2>/dev/null || $PB -c "Set :DTSDKBuild $SDK_BUILD" "$PLIST"
          $PB -c "Add :DTCompiler string com.apple.compilers.llvm.clang.1_0" "$PLIST" 2>/dev/null || true
          $PB -c "Set :CFBundleDisplayName Flynt" "$PLIST"
          $PB -c "Set :CFBundleShortVersionString $APP_VERSION" "$PLIST"
          $PB -c "Set :CFBundleVersion $APP_VERSION" "$PLIST"
          $PB -c "Delete :CFBundleSupportedPlatforms" "$PLIST" 2>/dev/null || true
          $PB -c "Add :CFBundleSupportedPlatforms array" "$PLIST"
          $PB -c "Add :CFBundleSupportedPlatforms:0 string iPhoneOS" "$PLIST"
          $PB -c "Add :UILaunchScreen dict" "$PLIST" 2>/dev/null || true

          # Compile asset catalog and merge actool's partial plist
          PARTIAL_PLIST=$(mktemp)
          xcrun actool "crates/flynt-mobile/assets/Assets.xcassets" \
            --compile "$APP" --platform iphoneos --minimum-deployment-target 17.0 \
            --app-icon AppIcon --target-device iphone --target-device ipad \
            --compress-pngs --output-format human-readable-text \
            --output-partial-info-plist "$PARTIAL_PLIST"
          plutil -convert xml1 "$PLIST"
          $PB -c "Merge $PARTIAL_PLIST" "$PLIST"
          rm -f "$PARTIAL_PLIST"
          plutil -convert binary1 "$PLIST"

      - name: Build share extension
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          BUILD_DIR="target/share-extension-build"
          APPEX_DIR="$BUILD_DIR/FlyntShare.appex"
          rm -rf "$BUILD_DIR"
          mkdir -p "$APPEX_DIR"
          xcrun --sdk iphoneos swiftc \
            crates/flynt-mobile/ios/ShareExtension/Sources/*.swift \
            -o "$APPEX_DIR/FlyntShare" \
            -target arm64-apple-ios17.0 -module-name FlyntShare \
            -application-extension \
            -Xlinker -e -Xlinker _NSExtensionMain \
            -framework Foundation -framework UIKit -framework SwiftUI -framework UniformTypeIdentifiers \
            -sdk "$SDK_PATH" -O
          cp crates/flynt-mobile/ios/ShareExtension/Info.plist "$APPEX_DIR/Info.plist"

      - name: Assemble bundle + sign
        if: env.KEYCHAIN_PATH != ''
        run: |
          APP="target/dx/flynt-mobile/release/ios/FlyntMobile.app"
          PLUGINS="$APP/PlugIns"
          mkdir -p "$PLUGINS"
          cp -R target/share-extension-build/FlyntShare.appex "$PLUGINS/"

          # Embed distribution provisioning profiles
          echo "$IOS_DIST_PROFILE_B64" | base64 --decode > "$APP/embedded.mobileprovision"
          echo "$IOS_SHARE_DIST_PROFILE_B64" | base64 --decode > "$PLUGINS/FlyntShare.appex/embedded.mobileprovision"

          # Sign (inside-out)
          DIST_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          codesign --force \
            --entitlements crates/flynt-mobile/ios/ShareExtension/ShareExtension.entitlements \
            --sign "$DIST_IDENTITY" --keychain "$KEYCHAIN_PATH" \
            "$PLUGINS/FlyntShare.appex"
          codesign --force \
            --entitlements crates/flynt-mobile/ios/Flynt.entitlements \
            --sign "$DIST_IDENTITY" --keychain "$KEYCHAIN_PATH" \
            "$APP"

      - name: Export IPA
        if: env.KEYCHAIN_PATH != ''
        run: |
          APP="target/dx/flynt-mobile/release/ios/FlyntMobile.app"
          ARTIFACT_VERSION="${RELEASE_TAG#v}"

          # Build IPA directly — synthetic xcarchive + xcodebuild is fragile.
          # A signed .app in a Payload/ directory is all an IPA needs.
          rm -rf target/ipa
          mkdir -p target/ipa/Payload
          cp -R "$APP" target/ipa/Payload/Flynt.app
          cd target/ipa
          zip -qr "Flynt-${ARTIFACT_VERSION}.ipa" Payload
          rm -rf Payload
          cd ../..
          echo "IPA=target/ipa/Flynt-${ARTIFACT_VERSION}.ipa" >> "$GITHUB_ENV"

      - name: Upload to TestFlight (iOS)
        continue-on-error: true
        if: env.APPLE_API_KEY_P8_B64 != ''
        run: |
          mkdir -p private_keys
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          IPA=$(ls target/ipa/*.ipa | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$APPLE_API_KEY_ID" --apiIssuer "$APPLE_API_ISSUER"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flynt-ios
          path: target/ipa/*.ipa

  release:
    name: Create GitHub Release
    needs: [prepare-release, build-linux, build-macos]
    # Run when triggered by tag push OR by workflow_dispatch that supplied a tag.
    # The publish step needs a tag name; both paths set env.RELEASE_TAG, but
    # github.ref is `refs/heads/main` for workflow_dispatch, so we have to
    # accept either trigger explicitly.
    if: always() && (startsWith(github.ref, 'refs/tags/') || inputs.tag_name != '') && needs.build-macos.result == 'success' && (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Set release commit
        run: echo "RELEASE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate signed release manifest
        env:
          FLYNT_RELEASE_SIGNING_KEY_B64: ${{ secrets.FLYNT_RELEASE_SIGNING_KEY_B64 }}
        run: |
          if [ -z "${FLYNT_RELEASE_SIGNING_KEY_B64:-}" ]; then
            echo "::error::FLYNT_RELEASE_SIGNING_KEY_B64 is required to publish a signed release manifest"
            exit 1
          fi

          python3 -m venv "$RUNNER_TEMP/release-manifest-venv"
          . "$RUNNER_TEMP/release-manifest-venv/bin/activate"
          python -m pip install pynacl
          mkdir -p artifacts/release-metadata

          python <<'PY'
          import base64
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path

          from nacl.signing import SigningKey

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["RELEASE_TAG"]
          channel = "nightly" if "nightly" in tag else "stable"
          commit = os.environ["RELEASE_COMMIT"]
          if channel == "nightly":
              try:
                  import tomllib
                  app_toml = tomllib.loads(Path("crates/flynt-app/Cargo.toml").read_text())
                  package_version = app_toml["package"].get("version")
                  if isinstance(package_version, str):
                      base_version = package_version
                  else:
                      workspace_toml = tomllib.loads(Path("Cargo.toml").read_text())
                      base_version = workspace_toml["workspace"]["package"]["version"]
              except Exception:
                  base_version = "0.0.0"
              tag_parts = tag.split("-")
              stamp = tag_parts[1] if len(tag_parts) >= 3 else datetime.datetime.now(datetime.UTC).strftime("%Y%m%d%H%M%S")
              version = f"{base_version}-nightly.{stamp}.{commit[:7]}"
          else:
              version = tag[1:] if tag.startswith("v") else tag
          metadata_dir = Path("artifacts/release-metadata")

          def classify(name: str):
              if name.startswith("Flynt-") and name.endswith("-macos.pkg"):
                  return "pkg", "macos", "universal", "UZBY9DM42N", True
              if name.startswith("Flynt-") and name.endswith("-macos.dmg"):
                  return "dmg", "macos", "universal", "UZBY9DM42N", True
              if name.startswith("flynt-") and name.endswith("-linux-amd64.tar.gz"):
                  return "tar", "linux", "amd64", None, False
              if name.startswith("flynt-") and name.endswith("-linux-arm64.tar.gz"):
                  return "tar", "linux", "arm64", None, False
              if name.startswith("flynt-agent-") and name.endswith("-universal-apple-darwin.tar.gz"):
                  return "flynt-agent", "macos", "universal", None, False
              if name.startswith("flynt-agent-") and name.endswith("-x86_64-unknown-linux-gnu.tar.gz"):
                  return "flynt-agent", "linux", "amd64", None, False
              if name.startswith("flynt-agent-") and name.endswith("-aarch64-unknown-linux-gnu.tar.gz"):
                  return "flynt-agent", "linux", "arm64", None, False
              if name.endswith(".ipa"):
                  return "ipa", "ios", "arm64", None, False
              return "artifact", "unknown", "unknown", None, False

          artifacts = []
          for path in sorted(Path("artifacts").rglob("*")):
              if not path.is_file() or metadata_dir in path.parents:
                  continue
              name = path.name
              kind, platform, arch, team_id, notarized = classify(name)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              artifact = {
                  "name": name,
                  "kind": kind,
                  "platform": platform,
                  "arch": arch,
                  "url": f"https://github.com/{repo}/releases/download/{tag}/{name}",
                  "sha256": digest,
                  "size": path.stat().st_size,
                  "apple_notarized": notarized,
              }
              if team_id:
                  artifact["apple_team_id"] = team_id
              artifacts.append(artifact)

          manifest = {
              "version": version,
              "channel": channel,
              "tag": tag,
              "commit": commit,
              "published_at": datetime.datetime.now(datetime.UTC).isoformat().replace("+00:00", "Z"),
              "artifacts": artifacts,
          }
          manifest_bytes = json.dumps(manifest, sort_keys=True, separators=(",", ":")).encode("utf-8")
          (metadata_dir / "flynt-release.json").write_bytes(manifest_bytes)

          seed = base64.b64decode(os.environ["FLYNT_RELEASE_SIGNING_KEY_B64"].strip())
          if len(seed) != 32:
              raise SystemExit("FLYNT_RELEASE_SIGNING_KEY_B64 must decode to a 32-byte Ed25519 seed")
          signature = SigningKey(seed).sign(manifest_bytes).signature
          (metadata_dir / "flynt-release.json.sig").write_text(base64.b64encode(signature).decode("ascii") + "\n")

          checksum_lines = []
          for path in sorted(Path("artifacts").rglob("*")):
              if path.is_file():
                  checksum_lines.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}")
          (metadata_dir / "SHA256SUMS").write_text("\n".join(checksum_lines) + "\n")
          PY

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_FLAGS=()
          TARGET_FLAGS=()
          if [[ "$RELEASE_TAG" == nightly-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
            TARGET_FLAGS+=(--target "$RELEASE_COMMIT")
            VERSION="$RELEASE_TAG"
            git tag "$RELEASE_TAG" "$RELEASE_COMMIT"
            git push origin "refs/tags/$RELEASE_TAG"
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [[ "$RELEASE_TAG" == nightly-* ]]; then
              gh release edit "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "Flynt $RELEASE_TAG" \
                --prerelease
            fi
            gh release upload "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              artifacts/**/*
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Flynt $VERSION" \
              "${RELEASE_FLAGS[@]}" \
              "${TARGET_FLAGS[@]}" \
              --generate-notes \
              artifacts/**/*
          fi

      - name: Update Homebrew tap
        if: ${{ startsWith(env.RELEASE_TAG, 'v') && !contains(env.RELEASE_TAG, '-rc.') && !contains(env.RELEASE_TAG, '-nightly.') }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"

          update_tap_file() {
            local path="$1"
            local file="$2"
            local message="$3"
            local content
            local existing_sha

            content=$(base64 -w0 "$file")
            existing_sha=$(gh api "repos/styrene-lab/homebrew-tap/contents/$path" --jq '.sha' 2>/dev/null || echo "")
            if [ -n "$existing_sha" ]; then
              gh api "repos/styrene-lab/homebrew-tap/contents/$path" \
                -X PUT \
                -f message="$message" \
                -f content="$content" \
                -f sha="$existing_sha" > /dev/null
            else
              gh api "repos/styrene-lab/homebrew-tap/contents/$path" \
                -X PUT \
                -f message="$message" \
                -f content="$content" > /dev/null
            fi
          }

          # Compute SHA256 for release artifacts
          AMD64_SHA=""
          ARM64_SHA=""
          DMG_SHA=""
          AMD64_FILE=$(find artifacts/ -name "*linux-amd64*.tar.gz" -type f | head -1)
          ARM64_FILE=$(find artifacts/ -name "*linux-arm64*.tar.gz" -type f | head -1)
          DMG_FILE=$(find artifacts/ -name "Flynt-*-macos.dmg" -type f | head -1)
          if [ -n "$AMD64_FILE" ]; then AMD64_SHA=$(sha256sum "$AMD64_FILE" | cut -d' ' -f1); fi
          if [ -n "$ARM64_FILE" ]; then ARM64_SHA=$(sha256sum "$ARM64_FILE" | cut -d' ' -f1); fi
          if [ -n "$DMG_FILE" ]; then DMG_SHA=$(sha256sum "$DMG_FILE" | cut -d' ' -f1); fi

          if [ -z "$DMG_SHA" ]; then
            echo "Skipping Homebrew cask update — missing macOS DMG artifact"
          else
            cat > /tmp/flynt-cask.rb << CASK
          # typed: false
          # frozen_string_literal: true

          cask "flynt" do
            version "$VERSION"
            sha256 "$DMG_SHA"

            url "https://github.com/styrene-lab/flynt/releases/download/v#{version}/Flynt-#{version}-macos.dmg"
            name "Flynt"
            desc "Local-first knowledge workspace"
            homepage "https://github.com/styrene-lab/flynt"

            depends_on macos: ">= :monterey"

            app "Flynt.app"

            zap trash: [
              "~/Library/Application Support/io.styrene.codex",
              "~/Library/Caches/io.styrene.codex",
              "~/Library/Preferences/io.styrene.codex.plist",
            ]
          end
          CASK
            update_tap_file "Casks/flynt.rb" /tmp/flynt-cask.rb "Update Flynt cask to $VERSION"
          fi

          if [ -z "$AMD64_SHA" ] || [ -z "$ARM64_SHA" ]; then
            echo "Skipping Homebrew Linux formula update — missing Linux artifacts"
          else
            cat > /tmp/flynt-formula.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Flynt < Formula
            desc "Local-first knowledge vault — notes, tasks, diagrams, and agent integration"
            homepage "https://github.com/styrene-lab/flynt"
            license "BUSL-1.1"
            version "$VERSION"

            on_linux do
              depends_on "webkitgtk" => "4.1"
              depends_on "gtk+3"

              on_arm do
                url "https://github.com/styrene-lab/flynt/releases/download/v#{version}/flynt-v#{version}-linux-arm64.tar.gz"
                sha256 "$ARM64_SHA"
              end

              on_intel do
                url "https://github.com/styrene-lab/flynt/releases/download/v#{version}/flynt-v#{version}-linux-amd64.tar.gz"
                sha256 "$AMD64_SHA"
              end
            end

            on_macos do
              odie "Flynt for macOS is available as a DMG or PKG. See: https://github.com/styrene-lab/flynt/releases"
            end

            def install
              bin.install "flynt"
              (share/"flynt").install "assets" if File.directory?("assets")
              (share/"applications").install "flynt.desktop" if File.exist?("flynt.desktop")
              if File.exist?("flynt.png")
                (share/"icons/hicolor/256x256/apps").install "flynt.png"
              end
            end

            test do
              assert_match "flynt", shell_output("#{bin}/flynt --version")
            end
          end
          FORMULA
            update_tap_file "Formula/flynt.rb" /tmp/flynt-formula.rb "Update Flynt formula to $VERSION"
          fi
          echo "Homebrew tap updated to $VERSION"
