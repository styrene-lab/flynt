name: release-plz

# DISABLED until flynt's library crates are ready for crates.io.
# The `push` trigger is intentionally absent — the workflow only runs
# on manual `workflow_dispatch`, so it sits dormant in CI but is
# available the moment the first publishable release is ready.
#
# To enable for real, add `push: { branches: [main] }` to the `on:`
# block AND update `release-plz.toml` to opt-in the specific crates
# being published. Today everything in `release-plz.toml` has
# `publish = false`, so even a manual dispatch is a no-op until a
# crate is whitelisted.
#
# Requires the org-level CARGO_REGISTRY_TOKEN secret when enabled.

on:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'styrene-lab' }}
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'styrene-lab' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
