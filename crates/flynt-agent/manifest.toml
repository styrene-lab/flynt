[extension]
name        = "flynt"
version     = "0.1.0"
description = "Vault document and task tools — search, read, write, and manage kanban boards from Flynt."
sdk_version = "0.15"

[runtime]
type   = "native"
binary = "flynt-agent"

[startup]
ping_method = "get_tools"
timeout_ms  = 5000

[mind]
enabled       = true
description   = "Remembers vault structure, recent documents, and project context."
max_facts     = 500
retention_days = 90
